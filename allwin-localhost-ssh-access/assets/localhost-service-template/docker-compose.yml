name: ${PROJECT}

services:
  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      SERVICE_HOST: ${SERVICE_HOST:-0.0.0.0}
      SERVICE_PORT: ${SERVICE_PORT:-3000}
    ports:
      - "127.0.0.1:${REMOTE_ACCESS_PORT:?REMOTE_ACCESS_PORT is required}:${SERVICE_PORT:-3000}"

